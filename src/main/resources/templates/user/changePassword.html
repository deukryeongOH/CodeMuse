<!DOCTYPE html>
<html xmlns:th=http://www.thymeleaf.org>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeMuse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bgAnimation {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        .animated-bg {
          background: linear-gradient(-45deg, #1a202c, #2d3748, #4a5568, #718096);
          background-size: 400% 400%;
          animation: bgAnimation 20s ease infinite;
        }
    </style>
</head>
<body>
    <form th:action="@{/user/changePassword}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        현재 비밀번호: <input type="password" name="password"><br>

        변경할 비밀번호: <input type="password" name="changePassword"><br>

        비밀번호 확인 <input type="password" name="confirmPassword"><br>

        <button type="submit">변경</button>
        <button type="reset"
        th:onclick="|location.href='@{/user/myPage}'|">취소</button>
    </form>
</body>
</html>

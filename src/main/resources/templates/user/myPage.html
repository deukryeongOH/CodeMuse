<!DOCTYPE html>
<html xmlns:th=http://www.thymeleaf.org>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeMuse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bgAnimation {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        .animated-bg {
          background: linear-gradient(-45deg, #1a202c, #2d3748, #4a5568, #718096);
          background-size: 400% 400%;
          animation: bgAnimation 20s ease infinite;
        }
    </style>
</head>
<body>
<div>
    <h2>계정 관리</h2>
    <form th:action="@{/user/myPage}" method="post" th:object="${userDetailsDto}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div>
            <label>아이디: 변경 불가</label>
        </div>

        <div>
            <label>비밀번호</label>
            <a th:href="@{/user/changePassword}">비밀번호 변경</a>
        </div>

        <div>
            <label for="name">이름:</label>
            <input id="name" type="text" th:field="*{name}" placeholder="이름을 입력하세요" />
        </div>

        <div>
            <label for="email">이메일:</label>
            <input id="email" type="email" th:field="*{email}" placeholder="이메일을 입력하세요" />
        </div>

        <div>
            <label for="nickName">닉네임:</label>
            <input id="nickName" type="text" th:field="*{nickName}" placeholder="닉네임을 입력하세요" />
        </div>

        <button type="submit">개인정보 변경</button>
    </form>
    <br>
    <button type="button" th:onclick="|location.href='@{/dashboard}'|">메인 페이지</button>
</div>
</body>
</html>

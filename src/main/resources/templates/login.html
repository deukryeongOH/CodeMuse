<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Muse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 배경 그라데이션 애니메이션 */
        @keyframes bgAnimation {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        .animated-bg {
          background: linear-gradient(-45deg, #1a202c, #2d3748, #4a5568, #718096);
          background-size: 400% 400%;
          animation: bgAnimation 20s ease infinite;
        }
    </style>
</head>
<body class="min-h-screen text-white flex animated-bg relative overflow-hidden">
<!-- 좌측 심플 아이콘 메뉴 -->
<nav class="flex flex-col items-center p-4 space-y-4 z-20">
    <button class="p-2 bg-gray-800 rounded hover:bg-gray-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01"/></svg>
    </button>
    <button class="p-2 bg-gray-800 rounded hover:bg-gray-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 6h14M5 12h14M5 18h14"/></svg>
    </button>
</nav>

<div class="flex-grow flex flex-col items-center justify-center">
    <!-- 로그인 카드 -->
    <div class="bg-gray-800 bg-opacity-80 backdrop-blur-sm p-8 rounded-2xl shadow-lg w-full max-w-sm">
        <h2 class="text-3xl font-bold text-center mb-6">Code in Muse<br>Muse in Code</h2>
        <h4 class="font-bold text-center mb-6">LOGIN</h4>
        <form th:action="@{/login}" th:object="${userLoginDto}" method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div>
                <input th:field="*{accountId}" placeholder="계정 아이디" class="w-full px-4 py-2 bg-gray-700 rounded focus:outline-none focus:ring-2 focus:ring-cyan-500" />
            </div>
            <div>
                <input th:field="*{password}" type="password" placeholder="비밀번호" class="w-full px-4 py-2 bg-gray-700 rounded focus:outline-none focus:ring-2 focus:ring-cyan-500" />
            </div>
            <button type="submit" class="w-full py-2 bg-cyan-500 rounded-md font-semibold hover:bg-cyan-600 transition">로그인</button>
        </form>
        <div class="mt-4 flex justify-between text-sm text-gray-400">
            <a th:href="@{/signUp}" class="hover:text-white">회원가입</a>
            <a th:href="@{/findId}" class="hover:text-white">아이디 찾기</a>
            <a th:href="@{/findPassword}" class="hover:text-white">비밀번호 찾기</a>
        </div>
    </div>
</div>

<!-- 우측 상단 토글 -->
<div class="absolute top-4 right-4">
    <label class="inline-flex items-center cursor-pointer">
        <input type="checkbox" class="sr-only peer" />
        <div class="w-14 h-7 bg-gray-700 rounded-full peer-checked:bg-gray-300 transition"></div>
        <div class="absolute left-1 top-1 w-5 h-5 bg-cyan-400 rounded-full peer-checked:left-8 transition"></div>
    </label>
</div>

</body>
